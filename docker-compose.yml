services:
  simulator:
    build: .
    container_name: churn-simulator
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./config:/app/config
    command: python src/main.py --mode ${APP_MODE:-simulate} --sim-mode ${SIM_MODE:-full}

  validator:
    build: .
    container_name: churn-validator
    env_file:
      - .env
    depends_on:
      simulator:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./config:/app/config
    command: python src/data/validate_simulator.py

  dashboard:
    build: .
    container_name: churn-dashboard
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      validator:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./config:/app/config
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    profiles:
      - dashboard
