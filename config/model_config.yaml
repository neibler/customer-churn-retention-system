# ════════════════════════════════════════════════════════════════
# 클래스 불균형 처리: SMOTE 단일 방식
# ════════════════════════════════════════════════════════════════
smote:
  k_neighbors: 5

# ════════════════════════════════════════════════════════════════
# CV 설정
# random_state 는 data.random_state 를 공통 시드로 사용
# ════════════════════════════════════════════════════════════════
cv:
  n_splits: 5
  shuffle: true

# ════════════════════════════════════════════════════════════════
# 데이터 + 전역 시드
# 이 random_state 가 split / KFold / SMOTE / Optuna TPE 공통 적용됨
# ════════════════════════════════════════════════════════════════
data:
  id_col: customer_id
  random_state: 42
  stratify: true
  target_col: churned
  test_size: 0.2
  treatment_col: is_treatment
  val_size: 0.1

# ════════════════════════════════════════════════════════════════
# 모델 하이퍼파라미터
# default_params 는 Optuna 가 켜져 있으면 base 로만 쓰이고 search_space
# 의 파라미터들은 각 trial 에서 덮어써짐.
# ════════════════════════════════════════════════════════════════
lightgbm:
  default_params:
    boosting_type: gbdt
    colsample_bytree: 0.8
    learning_rate: 0.05
    max_depth: -1
    metric: auc
    min_child_samples: 20
    n_estimators: 500
    n_jobs: -1
    num_leaves: 31
    objective: binary
    random_state: 42
    reg_alpha: 0.0
    reg_lambda: 1.0
    subsample: 0.8
    verbose: -1
  early_stopping_rounds: 30

xgboost:
  default_params:
    colsample_bytree: 0.8
    eval_metric: auc
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 1
    n_estimators: 500
    n_jobs: -1
    objective: binary:logistic
    random_state: 42
    reg_alpha: 0.0
    reg_lambda: 1.0
    subsample: 0.8
    tree_method: hist
  early_stopping_rounds: 30

# ════════════════════════════════════════════════════════════════
# Optuna 튜닝 (태스크 2.12)
# ════════════════════════════════════════════════════════════════
optuna:
  enabled: true
  n_trials: 50
  timeout_seconds: 1800
  search_space:
    # 형식: param_name: [low, high, type]
    # type ∈ {"int", "float", "log"}
    xgboost:
      colsample_bytree: [0.6, 1.0, float]
      learning_rate: [0.01, 0.3, log]
      max_depth: [3, 10, int]
      min_child_weight: [1, 10, int]
      reg_alpha: [0.0, 5.0, float]
      reg_lambda: [0.5, 10.0, float]
      subsample: [0.6, 1.0, float]
    lightgbm:
      colsample_bytree: [0.6, 1.0, float]
      learning_rate: [0.01, 0.3, log]
      min_child_samples: [5, 50, int]
      num_leaves: [15, 127, int]
      reg_alpha: [0.0, 5.0, float]
      reg_lambda: [0.5, 10.0, float]
      subsample: [0.6, 1.0, float]

# ════════════════════════════════════════════════════════════════
# Threshold 분석 (태스크 2.13)
# method 선택지:
#   max_f1       : precision-recall 균형 (default)
#   max_youden   : TPR - FPR 최대 (진단 의학 표준)
#   precision_at : precision >= target 만족 + recall 최대 (FP 비용 ↑)
#   recall_at    : recall >= target 만족 + precision 최대 (FN 비용 ↑)
# ════════════════════════════════════════════════════════════════
threshold:
  method: max_f1
  # precision_at / recall_at 방식 사용 시에만 의미 있음
  precision_target: 0.70
  recall_target: 0.70

# ════════════════════════════════════════════════════════════════
# 로깅
# ════════════════════════════════════════════════════════════════
logging:
  experiment_name: churn_prediction
  level: INFO
  log_file: logs/train.log
  mlflow_tracking_uri: ''

# ════════════════════════════════════════════════════════════════
# 모델 파일명 (G5 버전 관리)
# ════════════════════════════════════════════════════════════════
model_filenames:
  lightgbm: lightgbm_{version}.joblib
  xgboost: xgboost_{version}.joblib
model_version: v1

# ════════════════════════════════════════════════════════════════
# 경로
# threshold_curve 추가
# ════════════════════════════════════════════════════════════════
paths:
  customers: data/raw/customers.csv
  events: data/raw/events.csv
  features: data/processed/feature_store.parquet
  model_report: docs/model_report.md
  models_dir: models/
  results_dir: results/
  shap_dependence_dir: results/shap_dependence/
  shap_summary: results/shap_summary.png
  threshold_curve: results/threshold_pr_curve.png

# ════════════════════════════════════════════════════════════════
# SHAP
# ════════════════════════════════════════════════════════════════
shap:
  dependence_top_n: 5
  generate_dependence_plots: true
  sample_size: 2000
  top_n_features: 10