# ════════════════════════════════════════════════════════════════
# 클래스 불균형 처리: SMOTE 단일 방식
# ════════════════════════════════════════════════════════════════
smote:
  k_neighbors: 5

# ════════════════════════════════════════════════════════════════
# CV 설정
# random_state 는 data.random_state 를 공통 시드로 사용
# ════════════════════════════════════════════════════════════════
cv:
  n_splits: 5
  shuffle: true

# ════════════════════════════════════════════════════════════════
# 데이터 + 전역 시드
# 이 random_state 가 split / KFold / SMOTE / Optuna TPE 공통 적용됨
# ════════════════════════════════════════════════════════════════
data:
  id_col: customer_id
  random_state: 42
  stratify: true
  target_col: churned
  test_size: 0.2
  treatment_col: is_treatment
  val_size: 0.1

# ════════════════════════════════════════════════════════════════
# 모델 하이퍼파라미터
# default_params 는 Optuna 가 켜져 있으면 base 로만 쓰이고 search_space
# 의 파라미터들은 각 trial 에서 덮어써짐.
# ════════════════════════════════════════════════════════════════
lightgbm:
  default_params:
    boosting_type: gbdt
    colsample_bytree: 0.8
    learning_rate: 0.05
    max_depth: -1
    metric: auc
    min_child_samples: 20
    n_estimators: 500
    n_jobs: -1
    num_leaves: 31
    objective: binary
    random_state: 42
    reg_alpha: 0.0
    reg_lambda: 1.0
    subsample: 0.8
    verbose: -1
  early_stopping_rounds: 30

xgboost:
  default_params:
    colsample_bytree: 0.8
    eval_metric: auc
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 1
    n_estimators: 500
    n_jobs: -1
    objective: binary:logistic
    random_state: 42
    reg_alpha: 0.0
    reg_lambda: 1.0
    subsample: 0.8
    tree_method: hist
  early_stopping_rounds: 30

# ════════════════════════════════════════════════════════════════
# Optuna 튜닝 (태스크 2.12)
# ════════════════════════════════════════════════════════════════
optuna:
  enabled: true
  n_trials: 50
  timeout_seconds: 1800
  search_space:
    # 형식: param_name: [low, high, type]
    # type ∈ {"int", "float", "log"}
    xgboost:
      colsample_bytree: [0.6, 1.0, float]
      learning_rate: [0.01, 0.3, log]
      max_depth: [3, 10, int]
      min_child_weight: [1, 10, int]
      reg_alpha: [0.0, 5.0, float]
      reg_lambda: [0.5, 10.0, float]
      subsample: [0.6, 1.0, float]
    lightgbm:
      colsample_bytree: [0.6, 1.0, float]
      learning_rate: [0.01, 0.3, log]
      min_child_samples: [5, 50, int]
      num_leaves: [15, 127, int]
      reg_alpha: [0.0, 5.0, float]
      reg_lambda: [0.5, 10.0, float]
      subsample: [0.6, 1.0, float]

# ════════════════════════════════════════════════════════════════
# Threshold 분석 (태스크 2.13)
# method 선택지:
#   max_f1       : precision-recall 균형 (default)
#   max_youden   : TPR - FPR 최대 (진단 의학 표준)
#   precision_at : precision >= target 만족 + recall 최대 (FP 비용 ↑)
#   recall_at    : recall >= target 만족 + precision 최대 (FN 비용 ↑)
# ════════════════════════════════════════════════════════════════
threshold:
  method: max_f1
  # precision_at / recall_at 방식 사용 시에만 의미 있음
  precision_target: 0.70
  recall_target: 0.70

  # ════════════════════════════════════════════════════════════════
# DL (LSTM) 학습 설정 (태스크 2.14)
# 명세서 §5.5 요구사항:
#   - 고객 행동 시퀀스 입력 LSTM
#   - 패딩, 임베딩
#   - Early Stopping
#   - ML 모델과 동일 테스트셋에서 비교
#
# enabled: false 또는 CLI --skip_dl 로 우회 가능 (torch 미설치 환경 대응).
# ════════════════════════════════════════════════════════════════
dl:
  enabled: true
  device: auto              # "auto" / "cpu" / "cuda"
  max_seq_len: 100          # 최근 100개 이벤트만 보존 (90 분위수 ~80)
  # 모델 아키텍처
  embed_dim: 16             # event_type 임베딩 차원 (9 vocab → 16 dim 충분)
  hidden_dim: 64            # LSTM hidden state 크기
  n_layers: 2               # LSTM 층 수
  lstm_dropout: 0.2         # LSTM layer 사이 dropout (n_layers>1 일 때만 작동)
  fc_dropout: 0.3           # FC 직전 dropout (과적합 방지)
  # 학습 설정
  learning_rate: 0.001      # Adam lr
  batch_size: 64            # CPU 환경 적정
  max_epochs: 30            # early stopping 으로 보통 10~15 epoch 에서 종료
  early_stopping_patience: 3  # val AUC 3 epoch 개선 없으면 중단
  pos_weight_auto: true     # BCEWithLogitsLoss 의 pos_weight 자동 (n_neg/n_pos)
  # 저장
  model_filename: "lstm_{version}.pt"

# ════════════════════════════════════════════════════════════════
# Ensemble (ML + DL 결합, 태스크 2.15)
# 명세서 §5.5.5 "앙상블 방식의 성능 향상 여부 실험" 충족.
# method 선택지:
#   auto_auc : ML/DL 의 val AUC 비례 가중치 (default, 더 좋은 모델에 큰 weight)
#   fixed    : weight_ml 값 그대로 사용 (0.5 면 50:50)
# DL 결과 필수 — --skip_dl 시 ensemble 자동 스킵.
# ════════════════════════════════════════════════════════════════
ensemble:
  enabled: true
  method: auto_auc          # "auto_auc" 또는 "fixed"
  weight_ml: 0.5            # method=fixed 일 때만 사용 (ML 가중치)

# ════════════════════════════════════════════════════════════════
# 로깅
# ════════════════════════════════════════════════════════════════
logging:
  experiment_name: churn_prediction
  level: INFO
  log_file: logs/train.log
  mlflow_tracking_uri: ''

# ════════════════════════════════════════════════════════════════
# 모델 파일명 (G5 버전 관리)
# ════════════════════════════════════════════════════════════════
model_filenames:
  lightgbm: lightgbm_{version}.joblib
  xgboost: xgboost_{version}.joblib
model_version: v1

# ════════════════════════════════════════════════════════════════
# 경로
# threshold_curve 추가
# ════════════════════════════════════════════════════════════════
paths:
  customers: data/raw/customers.csv
  events: data/raw/events.csv # 기존 이벤트 데이터 경로
  features: data/processed/feature_store.parquet # 기존 피처스토어 경로
  logs_dir: logs/
  model_report: docs/model_report.md
  models_dir: models/
  results_dir: results/
  shap_dependence_dir: results/shap_dependence/
  shap_summary: results/shap_summary.png
  threshold_curve: results/threshold_pr_curve.png

# ════════════════════════════════════════════════════════════════
# SHAP
# ════════════════════════════════════════════════════════════════
shap:
  dependence_top_n: 5
  generate_dependence_plots: true
  sample_size: 2000
  top_n_features: 10